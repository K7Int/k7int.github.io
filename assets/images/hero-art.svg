<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="100%" height="100%">
  <defs>
    <radialGradient id="bgGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#7000ff" stop-opacity="0.25"/>
      <stop offset="60%" stop-color="#00f0ff" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#050507" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="cyanPurple" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00f0ff"/>
      <stop offset="100%" stop-color="#7000ff"/>
    </linearGradient>
    <linearGradient id="gridGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <filter id="neonGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Background Ambient Glow -->
  <rect width="800" height="600" fill="url(#bgGlow)"/>

  <!-- Perspective Cyber Grid -->
  <g transform="translate(0, 100)" stroke="url(#gridGrad)" stroke-width="1">
    <line x1="0" y1="400" x2="800" y2="400"/>
    <line x1="50" y1="350" x2="750" y2="350"/>
    <line x1="100" y1="300" x2="700" y2="300"/>
    <line x1="150" y1="250" x2="650" y2="250"/>
    <line x1="200" y1="200" x2="600" y2="200"/>
    <line x1="250" y1="150" x2="550" y2="150"/>
    <line x1="400" y1="150" x2="0" y2="450"/>
    <line x1="400" y1="150" x2="150" y2="450"/>
    <line x1="400" y1="150" x2="300" y2="450"/>
    <line x1="400" y1="150" x2="400" y2="450"/>
    <line x1="400" y1="150" x2="500" y2="450"/>
    <line x1="400" y1="150" x2="650" y2="450"/>
    <line x1="400" y1="150" x2="800" y2="450"/>
  </g>

  <!-- Isometric Central Core -->
  <g transform="translate(400, 260)">
    <!-- Outer Orbit Rings -->
    <ellipse cx="0" cy="0" rx="180" ry="70" fill="none" stroke="#00f0ff" stroke-width="1.5" stroke-dasharray="12 8" opacity="0.4" transform="rotate(-15)"/>
    <ellipse cx="0" cy="0" rx="240" ry="90" fill="none" stroke="#7000ff" stroke-width="1.5" stroke-dasharray="20 10" opacity="0.3" transform="rotate(20)"/>
    <ellipse cx="0" cy="0" rx="140" ry="140" fill="none" stroke="url(#cyanPurple)" stroke-width="1" opacity="0.2"/>

    <!-- Floating Cryptographic Cubes -->
    <g transform="translate(-140, -40)">
      <polygon points="0,-20 18,-10 18,10 0,20 -18,10 -18,-10" fill="rgba(0, 240, 255, 0.15)" stroke="#00f0ff" stroke-width="1.5"/>
      <line x1="0" y1="-20" x2="0" y2="20" stroke="#00f0ff" stroke-width="1"/>
    </g>
    <g transform="translate(160, 30)">
      <polygon points="0,-25 22,-12 22,12 0,25 -22,12 -22,-12" fill="rgba(112, 0, 255, 0.2)" stroke="#7000ff" stroke-width="1.5"/>
      <line x1="0" y1="-25" x2="0" y2="25" stroke="#7000ff" stroke-width="1"/>
    </g>
    <g transform="translate(60, -110)">
      <polygon points="0,-15 14,-7 14,7 0,15 -14,7 -14,-7" fill="rgba(16, 185, 129, 0.2)" stroke="#10b981" stroke-width="1.5"/>
    </g>
    <g transform="translate(-90, 90)">
      <polygon points="0,-18 16,-8 16,8 0,18 -16,8 -16,-8" fill="rgba(245, 158, 11, 0.2)" stroke="#f59e0b" stroke-width="1.5"/>
    </g>

    <!-- Central Glowing Shield / Data Vault Structure -->
    <path d="M 0,-70 L 60,-35 L 60,35 L 0,70 L -60,35 L -60,-35 Z" fill="rgba(13, 15, 20, 0.85)" stroke="url(#cyanPurple)" stroke-width="3" filter="url(#neonGlow)"/>
    <path d="M 0,-50 L 42,-25 L 42,25 L 0,50 L -42,25 L -42,-25 Z" fill="url(#cyanPurple)" opacity="0.25"/>
    <circle cx="0" cy="0" r="24" fill="#050507" stroke="#00f0ff" stroke-width="2"/>
    <circle cx="0" cy="0" r="10" fill="#00f0ff" filter="url(#neonGlow)"/>

    <!-- Connecting Data Lines -->
    <line x1="0" y1="0" x2="-140" y2="-40" stroke="#00f0ff" stroke-width="1" stroke-dasharray="4 4" opacity="0.6"/>
    <line x1="0" y1="0" x2="160" y2="30" stroke="#7000ff" stroke-width="1" stroke-dasharray="4 4" opacity="0.6"/>
    <line x1="0" y1="0" x2="60" y2="-110" stroke="#10b981" stroke-width="1" stroke-dasharray="4 4" opacity="0.6"/>
    <line x1="0" y1="0" x2="-90" y2="90" stroke="#f59e0b" stroke-width="1" stroke-dasharray="4 4" opacity="0.6"/>

    <!-- Glowing Data Nodes -->
    <circle cx="-140" cy="-40" r="4" fill="#00f0ff" filter="url(#neonGlow)"/>
    <circle cx="160" cy="30" r="4" fill="#7000ff" filter="url(#neonGlow)"/>
    <circle cx="60" cy="-110" r="4" fill="#10b981" filter="url(#neonGlow)"/>
    <circle cx="-90" cy="90" r="4" fill="#f59e0b" filter="url(#neonGlow)"/>
  </g>
</svg>