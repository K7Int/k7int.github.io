<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="100%" height="100%">
  <defs>
    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7000ff"/>
      <stop offset="50%" stop-color="#00f0ff"/>
      <stop offset="100%" stop-color="#10b981"/>
    </linearGradient>
    <radialGradient id="nodeGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00f0ff" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#050507" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="600" height="400" fill="url(#nodeGlow)"/>

  <!-- Isometric Grid Plane -->
  <g transform="translate(300, 240) scale(1, 0.5) rotate(45)" stroke="rgba(255, 255, 255, 0.08)" stroke-width="1" fill="none">
    <rect x="-150" y="-150" width="300" height="300"/>
    <line x1="-150" y1="-50" x2="150" y2="-50"/>
    <line x1="-150" y1="50" x2="150" y2="50"/>
    <line x1="-50" y1="-150" x2="-50" y2="150"/>
    <line x1="50" y1="-150" x2="50" y2="150"/>
  </g>

  <!-- Floating Data Nodes & Connections -->
  <g transform="translate(0, 0)">
    <!-- Node 1 -->
    <line x1="120" y1="260" x2="240" y2="160" stroke="url(#lineGrad)" stroke-width="2.5" stroke-dasharray="6 4"/>
    <!-- Node 2 -->
    <line x1="240" y1="160" x2="360" y2="220" stroke="url(#lineGrad)" stroke-width="2.5"/>
    <!-- Node 3 -->
    <line x1="360" y1="220" x2="480" y2="120" stroke="url(#lineGrad)" stroke-width="2.5"/>
    
    <!-- Vertical Pillars to Grid -->
    <line x1="120" y1="260" x2="120" y2="320" stroke="rgba(0, 240, 255, 0.3)" stroke-width="1" stroke-dasharray="2 2"/>
    <line x1="240" y1="160" x2="240" y2="270" stroke="rgba(0, 240, 255, 0.3)" stroke-width="1" stroke-dasharray="2 2"/>
    <line x1="360" y1="220" x2="360" y2="290" stroke="rgba(0, 240, 255, 0.3)" stroke-width="1" stroke-dasharray="2 2"/>
    <line x1="480" y1="120" x2="480" y2="250" stroke="rgba(0, 240, 255, 0.3)" stroke-width="1" stroke-dasharray="2 2"/>

    <!-- Spheres -->
    <circle cx="120" cy="260" r="10" fill="#7000ff" stroke="#ffffff" stroke-width="2"/>
    <circle cx="240" cy="160" r="12" fill="#00f0ff" stroke="#ffffff" stroke-width="2"/>
    <circle cx="360" cy="220" r="10" fill="#f59e0b" stroke="#ffffff" stroke-width="2"/>
    <circle cx="480" cy="120" r="14" fill="#10b981" stroke="#ffffff" stroke-width="2"/>
    
    <!-- Outer Glows -->
    <circle cx="240" cy="160" r="24" fill="rgba(0, 240, 255, 0.2)"/>
    <circle cx="480" cy="120" r="28" fill="rgba(16, 185, 129, 0.2)"/>
  </g>
</svg>