<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="100%" height="100%">
  <defs>
    <radialGradient id="shieldGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00f0ff" stop-opacity="0.25"/>
      <stop offset="70%" stop-color="#7000ff" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#050507" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="shieldStroke" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00f0ff"/>
      <stop offset="100%" stop-color="#7000ff"/>
    </linearGradient>
    <filter id="neon" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Background Radial Glow -->
  <rect width="600" height="400" fill="url(#shieldGlow)"/>

  <!-- Orbit Rings -->
  <circle cx="300" cy="200" r="140" fill="none" stroke="rgba(255, 255, 255, 0.06)" stroke-width="1" stroke-dasharray="8 8"/>
  <circle cx="300" cy="200" r="100" fill="none" stroke="rgba(0, 240, 255, 0.2)" stroke-width="1.5"/>

  <!-- Local Node Boxes around Shield -->
  <!-- Top Node -->
  <g transform="translate(300, 50)">
    <rect x="-30" y="-15" width="60" height="30" rx="6" fill="#0d0f14" stroke="#00f0ff" stroke-width="1.5"/>
    <circle cx="-12" cy="0" r="4" fill="#00f0ff" filter="url(#neon)"/>
    <line x1="0" y1="15" x2="0" y2="40" stroke="#00f0ff" stroke-width="1.5" stroke-dasharray="4 4"/>
  </g>
  <!-- Left Node -->
  <g transform="translate(140, 200)">
    <rect x="-30" y="-15" width="60" height="30" rx="6" fill="#0d0f14" stroke="#7000ff" stroke-width="1.5"/>
    <circle cx="-12" cy="0" r="4" fill="#7000ff" filter="url(#neon)"/>
    <line x1="30" y1="0" x2="55" y2="0" stroke="#7000ff" stroke-width="1.5" stroke-dasharray="4 4"/>
  </g>
  <!-- Right Node -->
  <g transform="translate(460, 200)">
    <rect x="-30" y="-15" width="60" height="30" rx="6" fill="#0d0f14" stroke="#10b981" stroke-width="1.5"/>
    <circle cx="-12" cy="0" r="4" fill="#10b981" filter="url(#neon)"/>
    <line x1="-30" y1="0" x2="-55" y2="0" stroke="#10b981" stroke-width="1.5" stroke-dasharray="4 4"/>
  </g>
  <!-- Bottom Node -->
  <g transform="translate(300, 350)">
    <rect x="-30" y="-15" width="60" height="30" rx="6" fill="#0d0f14" stroke="#f59e0b" stroke-width="1.5"/>
    <circle cx="-12" cy="0" r="4" fill="#f59e0b" filter="url(#neon)"/>
    <line x1="0" y1="-15" x2="0" y2="-40" stroke="#f59e0b" stroke-width="1.5" stroke-dasharray="4 4"/>
  </g>

  <!-- Central Cryptographic Shield -->
  <g transform="translate(300, 200)">
    <path d="M 0,-60 L 50,-35 C 50,20 30,50 0,70 C -30,50 -50,20 -50,-35 Z" fill="rgba(13, 15, 20, 0.9)" stroke="url(#shieldStroke)" stroke-width="3" filter="url(#neon)"/>
    <path d="M 0,-40 L 32,-22 C 32,10 20,32 0,48 C -20,32 -32,10 -32,-22 Z" fill="rgba(0, 240, 255, 0.15)"/>
    
    <!-- Lock Icon inside Shield -->
    <rect x="-14" y="-4" width="28" height="22" rx="4" fill="#00f0ff" filter="url(#neon)"/>
    <path d="M -8,-4 L -8,-14 C -8,-20 8,-20 8,-14 L 8,-4" fill="none" stroke="#ffffff" stroke-width="3" stroke-linecap="round"/>
    <circle cx="0" cy="7" r="3" fill="#000000"/>
  </g>
</svg>